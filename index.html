<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="//admin.theglobalavenues.com" />
    <link rel="preconnect" href="https://admin.theglobalavenues.com" crossorigin />
    <meta
      name="description"
      content="The Global Avenues - trusted partner for international education, consulting, and collaborations."
    />
    <meta name="application-name" content="The Global Avenues" />
    <meta name="apple-mobile-web-app-title" content="The Global Avenues" />
    <meta name="theme-color" content="#2D1B69" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var storedTheme = typeof window !== 'undefined'
            ? window.localStorage.getItem('tga-theme')
            : null;
          var theme = storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : 'dark';

          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (error) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <title>The Global Avenues</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
